<h2>Crear Libro</h2>

<form method="POST">
    <label>Titulo:</label>
    <input type="text" name="titulo" required><br><br>

    <label>ISBN:</label>
    <input type="number" name="isbn" required><br><br>

    <label>Autor:</label>
    <select name="autor_id">
        {% for autor in autores %}
        <option value="{{ autor.AUTOR_ID }}">
            {{ autor.nombre }}
        </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Guardar</button>
</form>
