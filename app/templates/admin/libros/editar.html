<h2>Editar Libro</h2>

<form method="POST">
    <label>Titulo:</label>
    <input type="text" name="titulo" value="{{ libro.titulo }}" required><br><br>

    <label>ISBN:</label>
    <input type="number" name="isbn" value="{{ libro.isbn }}" required><br><br>

    <label>Autor:</label>
    <select name="autor_id">
        {% for autor in autores %}
        <option value="{{ autor.AUTOR_ID }}" {% if autor.AUTOR_ID == libro.AUTOR_ID %}selected{% endif %}>
            {{ autor.nombre }}
        </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Actualizar</button>
</form>

<br>
<a href="{{ url_for('admin_routes.listar_libros') }}">Volver</a>
