<h2>Autores</h2>

<a href="{{ url_for('admin_routes.crear_autor') }}">Crear Autor</a>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
    </tr>

    {% for autor in autores %}
    <tr>
        <td>{{ autor.AUTOR_ID }}</td>
        <td>{{ autor.nombre }}</td>
        <td>
            <a href="{{ url_for('admin_routes.editar_autor', id=autor.AUTOR_ID) }}">Editar</a>
            |
            <a href="{{ url_for('admin_routes.eliminar_autor', id=autor.AUTOR_ID) }}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>
