<h2>Editar Usuario</h2>

<form method="POST">
    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ usuario.nombre }}" required><br><br>

    <label>Correo:</label>
    <input type="email" name="correo" value="{{ usuario.correo }}" required><br><br>

    <label>Password (déjalo vacío si no quieres cambiarlo):</label>
    <input type="password" name="password"><br><br>

    <label>Rol:</label>
    <select name="rol_id">
        <option value="">Sin rol</option>
        {% for rol in roles %}
        <option value="{{ rol.ROL_ID }}" {% if usuario.ROL_ID == rol.ROL_ID %}selected{% endif %}>
            {{ rol.nombre }}
        </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Guardar cambios</button>
</form>
